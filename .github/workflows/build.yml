name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      # Need write access to attach DMG / EXE directly to the GitHub
      # Release on tag pushes — bypasses the actions/artifacts quota
      # which fills up fast on a private free plan and has a 6-12h
      # recalculation lag once it hits the cap.
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Make (Mac)
        if: matrix.os == 'macos-latest'
        # arm64 only for v1 — universal build fails to stitch because
        # better-sqlite3 emits arch-asymmetric files (test_extension.node
        # on x64, _CodeSignature on arm64). Add a separate x64 matrix
        # entry later if Intel-Mac staff needs it.
        run: npm run make -- --arch=arm64
        env:
          # Code signing is deferred to v2. Empty so Electron Forge skips signing.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          # Vite renderer build hits the default ~2GB Node heap on CI runners.
          # 6GB fits well under the 14GB (mac) / 16GB (win) runner limits.
          NODE_OPTIONS: --max-old-space-size=6144
          # QBO OAuth developer credentials baked into the bundle by
          # vite.main.config.ts so end users don't have to paste them
          # into Settings before they can OAuth-connect their company.
          # Set via `gh secret set QBO_CLIENT_ID` / `QBO_CLIENT_SECRET`.
          QBO_CLIENT_ID: ${{ secrets.QBO_CLIENT_ID }}
          QBO_CLIENT_SECRET: ${{ secrets.QBO_CLIENT_SECRET }}

      - name: Make (Windows)
        if: matrix.os == 'windows-latest'
        run: npm run make
        env:
          NODE_OPTIONS: --max-old-space-size=6144
          QBO_CLIENT_ID: ${{ secrets.QBO_CLIENT_ID }}
          QBO_CLIENT_SECRET: ${{ secrets.QBO_CLIENT_SECRET }}

      - name: Upload artifacts (transient)
        # Non-tag dev iterations: try to upload to the actions/artifacts
        # bucket so the dev can fetch via gh run download. Tolerated when
        # the bucket is full so the run doesn't fail mid-upload —
        # tagged builds use the Release attachment path below instead.
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: qbo-extractor-${{ matrix.os }}
          path: |
            out/make/**/*
          if-no-files-found: warn
          # 3 days keeps the last 1-2 dev iterations queryable but bounds
          # storage well under the free-plan quota. Tag a release
          # (refs/tags/v*) for anything that should outlive that window —
          # Release attachments live on a separate budget.
          retention-days: 3

      - name: Attach to GitHub Release (on tag)
        # Tag pushes upload directly to the Release object, sidestepping
        # the actions/artifacts quota entirely. Each matrix job appends
        # its own files so the same release ends up with both the Mac
        # DMG and the Windows Setup.exe.
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            out/make/**/*.dmg
            out/make/**/*.exe
            out/make/**/*.zip
            out/make/**/*.nupkg
            out/make/**/RELEASES
          fail_on_unmatched_files: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
