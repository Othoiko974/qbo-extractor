name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Make (Mac)
        if: matrix.os == 'macos-latest'
        # arm64 only for v1 — universal build fails to stitch because
        # better-sqlite3 emits arch-asymmetric files (test_extension.node
        # on x64, _CodeSignature on arm64). Add a separate x64 matrix
        # entry later if Intel-Mac staff needs it.
        run: npm run make -- --arch=arm64
        env:
          # Code signing is deferred to v2. Empty so Electron Forge skips signing.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          # Vite renderer build hits the default ~2GB Node heap on CI runners.
          # 6GB fits well under the 14GB (mac) / 16GB (win) runner limits.
          NODE_OPTIONS: --max-old-space-size=6144

      - name: Make (Windows)
        if: matrix.os == 'windows-latest'
        run: npm run make
        env:
          NODE_OPTIONS: --max-old-space-size=6144

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qbo-extractor-${{ matrix.os }}
          path: |
            out/make/**/*
          if-no-files-found: warn
          retention-days: 14

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
